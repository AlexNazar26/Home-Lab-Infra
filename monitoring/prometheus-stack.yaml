apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: '68.0.0'
    helm:
      values: |
        prometheus:
          enabled: true
          prometheusSpec:
            retention: 7d
            resources:
              requests:
                cpu: 100m
                memory: 300Mi
              limits:
                memory: 600Mi
        grafana:
          enabled: true
          adminPassword: "admin"
          service:
            type: NodePort
            nodePort: 30000
          persistence:
            enabled: true
            size: 2Gi
        alertmanager:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true